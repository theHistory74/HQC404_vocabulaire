<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Quiz — Histoire du Québec et du Canada</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #1c1f26;
      --surface:   #252930;
      --surface2:  #2e333d;
      --border:    #3a4050;
      --border2:   #4a5268;
      --text:      #e8ecf4;
      --muted:     #8d97aa;
      --accent:    #7c9fd4;
      --accent2:   #a8c4e8;
      --green-bg:  #1a2b1e;
      --green-bd:  #4a8a5a;
      --green-tx:  #90d4a0;
      --red-bg:    #2b1a1e;
      --red-bd:    #8a4a54;
      --red-tx:    #d49098;
      --radius:    14px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-text-size-adjust: 100%;
    }

    .shell {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    .header {
      padding: 22px 20px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .header-icon {
      width: 36px; height: 36px;
      border-radius: 9px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
      opacity: 0.9;
    }

    .header h1 {
      font-family: 'Manrope', 'Inter', sans-serif;
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--text);
      line-height: 1.3;
    }

    .header h1 span {
      display: block;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: 0.03em;
    }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-track {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
      width: 0%;
    }

    .progress-label {
      font-size: 0.74rem;
      color: var(--muted);
      font-weight: 600;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      padding: 18px 16px 30px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── QUESTION CARD ── */
    .q-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 18px;
    }

    .q-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .q-num {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .q-type-pill {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 2px 9px;
      letter-spacing: 0.02em;
    }

    .q-text {
      font-family: 'Manrope', 'Inter', sans-serif;
      font-size: 1.12rem;
      font-weight: 400;
      line-height: 1.55;
      color: var(--text);
    }

    .q-type-pill.hidden { display: none; }

    .question-source-num {
      color: var(--accent2);
      font-size: 0.92em;
    }

    /* ── OPTIONS ── */
    .options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .opt-btn {
      width: 100%;
      text-align: left;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.91rem;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      align-items: flex-start;
      gap: 11px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .opt-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: var(--surface2);
    }

    .opt-btn:disabled { cursor: default; }

    .opt-letter {
      flex-shrink: 0;
      width: 22px; height: 22px;
      border-radius: 6px;
      background: var(--surface2);
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      margin-top: 1px;
      transition: background 0.15s, color 0.15s;
    }

    .opt-btn.correct {
      border-color: var(--green-bd);
      background: var(--green-bg);
    }
    .opt-btn.correct .opt-letter {
      background: var(--green-bd);
      color: #fff;
    }

    .opt-btn.incorrect {
      border-color: var(--red-bd);
      background: var(--red-bg);
    }
    .opt-btn.incorrect .opt-letter {
      background: var(--red-bd);
      color: #fff;
    }

    /* ── NOTE EXPLICATIVE (post-it) ── */
    .note-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.42);
      z-index: 1000;
      backdrop-filter: blur(2px);
    }

    .note-overlay.show { display: flex; }

    .note-card {
      position: relative;
      width: min(92vw, 430px);
      background: #f3df78;
      color: #372d08;
      border: 1px solid #d8c35d;
      border-radius: 8px;
      padding: 24px 18px 18px;
      box-shadow: 0 22px 46px rgba(0,0,0,0.35);
      transform: rotate(-1deg);
    }

    .note-card.correct {
      background: #bfe8ad;
      color: #16301b;
      border-color: #7bbc70;
    }

    .note-card.incorrect {
      background: #f1b2b2;
      color: #4a1518;
      border-color: #d57b7b;
    }

    .note-card::before,
    .note-card::after {
      content: "";
      position: absolute;
      top: -9px;
      width: 64px;
      height: 18px;
      background: rgba(255,255,255,0.38);
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 2px 3px rgba(0,0,0,0.05);
    }

    .note-card::before {
      left: 22px;
      transform: rotate(-9deg);
    }

    .note-card::after {
      right: 22px;
      transform: rotate(8deg);
    }

    .note-label {
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .note-text {
      font-size: 0.97rem;
      line-height: 1.62;
      margin-bottom: 16px;
    }

    .note-next-btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 13px 14px;
      background: #262a33;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.94rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.01em;
      -webkit-tap-highlight-color: transparent;
    }

    .note-next-btn:active { transform: scale(0.98); }


    /* ── REPRISE ── */
    .resume-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1100;
      backdrop-filter: blur(2px);
    }

    .resume-overlay.show { display: flex; }

    .resume-card {
      width: min(92vw, 420px);
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 20px 18px 18px;
      box-shadow: 0 22px 46px rgba(0,0,0,0.35);
    }

    .resume-title {
      font-family: 'Manrope', 'Inter', sans-serif;
      font-size: 1.02rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .resume-text {
      font-size: 0.92rem;
      line-height: 1.6;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .resume-field {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 14px;
    }

    .resume-field-label {
      font-size: 0.84rem;
      color: var(--text);
      font-weight: 600;
    }

    .resume-input {
      width: 100%;
      border: 1.5px solid var(--border2);
      border-radius: 12px;
      padding: 12px 13px;
      background: var(--surface2);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.94rem;
      outline: none;
    }

    .resume-input::placeholder {
      color: var(--muted);
    }

    .resume-input:focus {
      border-color: var(--accent);
    }

    .resume-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .resume-btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 13px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.94rem;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .resume-btn.primary {
      background: var(--accent);
      color: #111;
    }

    .resume-btn.secondary {
      background: transparent;
      color: var(--text);
      border: 1.5px solid var(--border2);
    }

    /* ── RESULT ── */
    .result-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
      padding: 10px 0;
    }

    .result-screen.show { display: flex; }

    .result-score {
      font-family: 'Manrope', 'Inter', sans-serif;
      font-size: 3.2rem;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .result-label {
      font-size: 0.88rem;
      color: var(--muted);
      font-weight: 500;
    }

    .result-track {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .result-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 1s cubic-bezier(.4,0,.2,1);
      width: 0;
    }

    .result-note {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── ACTIONS ── */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 0.94rem;
      font-weight: 600;
      cursor: pointer;
      display: none;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
      -webkit-tap-highlight-color: transparent;
    }

    .btn.visible { display: block; }
    .btn:active { transform: scale(0.98); }

    .next-btn {
      background: var(--accent);
      color: #111;
    }

    .more-btn {
      background: transparent;
      border: 1.5px solid var(--border2);
      color: var(--text);
    }

    /* ── TABLET ── */
    @media (min-width: 640px) {
      body { background: #141619; padding: 28px 12px; }
      .shell {
        min-height: auto;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 24px 64px rgba(0,0,0,0.4);
        border: 1px solid var(--border);
      }
      .header { padding: 24px 24px 18px; }
      .content { padding: 22px 22px 32px; }
    }
  </style>
</head>
<body>
  <div class="shell">

    <div class="header">
      <div class="header-top">
        <div class="header-icon">📜</div>
        <h1>
          Quiz — Histoire 4<sup>e</sup>
          <span>Vocabulaire · 10 questions par session</span>
        </h1>
      </div>
      <div class="progress-row">
        <div class="progress-track">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-label" id="progressLabel">1 / 10</div>
      </div>
    </div>

    <div class="content">

      <div class="q-card" id="qCard">
        <div class="q-meta">
          <span class="q-num" id="qNum">Question 1</span>
          <span class="q-type-pill" id="qType"></span>
        </div>
        <div class="q-text" id="qText"></div>
      </div>

      <div class="options" id="options"></div>

      <div class="note-overlay" id="noteOverlay">
        <div class="note-card" id="noteCard" role="dialog" aria-modal="true" aria-labelledby="noteLabel">
          <div class="note-label" id="noteLabel">Note explicative</div>
          <div class="note-text" id="noteText"></div>
          <button class="note-next-btn" id="noteNextBtn">Question suivante →</button>
        </div>
      </div>



      <div class="resume-overlay" id="resumeOverlay">
        <div class="resume-card" role="dialog" aria-modal="true" aria-labelledby="resumeTitle">
          <div class="resume-title" id="resumeTitle">Une progression a été trouvée</div>
          <div class="resume-text" id="resumeText">Tu peux reprendre là où tu t’étais arrêté ou recommencer depuis le début.<br><br>Pour conserver ta progression, il vaut mieux utiliser le même appareil et le même navigateur.</div>
          <div class="resume-field" id="resumeField">
            <label class="resume-field-label" for="playerNameInput">Nom ou surnom (facultatif)</label>
            <input class="resume-input" id="playerNameInput" type="text" maxlength="40" placeholder="Ex. Max" autocomplete="name" />
          </div>
          <div class="resume-actions">
            <button class="resume-btn primary" id="resumeContinueBtn">Reprendre</button>
            <button class="resume-btn secondary" id="resumeRestartBtn">Recommencer depuis le début</button>
          </div>
        </div>
      </div>

      <div class="result-screen" id="resultScreen">
        <div class="result-score" id="resultScore"></div>
        <div class="result-label" id="resultLabel"></div>
        <div class="result-track">
          <div class="result-bar" id="resultBar"></div>
        </div>
        <div class="result-note" id="resultNote"></div>
      </div>

      <div class="actions">
        <button class="btn next-btn" id="nextBtn">Question suivante →</button>
        <button class="btn more-btn" id="moreBtn">Dix autres questions</button>
      </div>

    </div>
  </div>

  <script>
    const QUIZ_SIZE = 10;
    const LETTERS = ['A','B','C','D'];

    const questions = [
      {
            "number": 1,
            "question": "Comment appelle-t-on l'indicateur qui explique la forte augmentation de la population entre 1945 et 1960, au moment où le Québec connaît un nombre record de naissances ?",
            "options": [
                  "ACCROISSEMENT NATUREL",
                  "INDICE DE FÉCONDITÉ",
                  "SOLDE MIGRATOIRE",
                  "SURPLUS DÉMOGRAPHIQUE GLOBAL"
            ],
            "answer": 0,
            "explanation": "Durant le Baby-boom, l'accroissement naturel est très élevé car le nombre de naissances dépasse largement le nombre de décès, ce qui fait bondir la population du Québec."
      },
      {
            "number": 2,
            "question": "Par quel processus l'État fédéral a-t-il tenté de forcer les jeunes Autochtones dans les pensionnats à abandonner leur culture pour adopter celle de la majorité blanche?",
            "options": [
                  "SÉGRÉGATION",
                  "ACCULTURATION",
                  "INTÉGRATION CIVIQUE",
                  "DÉCULTURATION SYSTÉMIQUE"
            ],
            "answer": 1,
            "explanation": "L'acculturation est le changement forcé de culture. Dans les pensionnats, on interdisait aux enfants de parler leur langue ou de pratiquer leurs traditions pour les assimiler à la culture dominante."
      },
      {
            "number": 3,
            "question": "Quel est le nom de l'accord commercial, signé en 2020 par le Canada, les États-Unis et le Mexique, pour s'adapter aux changements de l'économie mondiale ?",
            "options": [
                  "ALENA",
                  "ACEUM",
                  "PTPGP",
                  "TRAITÉ DE RÉCIPROCITÉ MODERNE"
            ],
            "answer": 1,
            "explanation": "L'ACEUM est l'entente actuelle qui facilite les échanges de marchandises entre les trois pays d'Amérique du Nord, remplaçant l'ancienne entente qu'était l'ALENA."
      },
      {
            "number": 4,
            "question": "Quel terme désigne le territoire formé par une ville centre et les banlieues qui l'entourent, une organisation qui s'est généralisée avec l'automobile après 1945 ?",
            "options": [
                  "DÉVITALISATION",
                  "ÉTALEMENT RÉSIDENTIEL",
                  "AGGLOMÉRATION URBAINE",
                  "PÉRIPHÉRIE MÉTROPOLITAINE"
            ],
            "answer": 2,
            "explanation": "Une agglomération urbaine est un espace composé d'une ville principale et de ses couronnes de banlieues. Ce mode d'organisation du territoire est lié à l'étalement urbain."
      },
      {
            "number": 5,
            "question": "Quelle idéologie, défendue par le clergé et Maurice Duplessis, encourageait les Québécois à rester à la campagne et à cultiver la terre pour protéger leurs traditions ?",
            "options": [
                  "COOPÉRATISME",
                  "AGRICULTURISME",
                  "LIBÉRALISME ÉCONOMIQUE",
                  "RURALISME IDENTITAIRE"
            ],
            "answer": 1,
            "explanation": "L'agriculturisme présentait la vie rurale comme le meilleur moyen de protéger la langue française et la religion catholique contre l'influence des villes industrielles."
      },
      {
            "number": 6,
            "question": "Quel accord de libre-échange, en vigueur de 1994 à 2020, a permis d'augmenter les échanges économiques entre le Canada, les États-Unis et le Mexique ?",
            "options": [
                  "ALENA",
                  "ACEUM",
                  "PACTE DE L'ATLANTIQUE",
                  "UNITÉ COMMERCIALE NORD-AMÉRICAINE"
            ],
            "answer": 0,
            "explanation": "L'ALENA a été l'accord économique majeur qui a marqué les exportations québécoises pendant plus de 25 ans avant d'être modernisé et remplacé par l'ACEUM."
      },
      {
            "number": 7,
            "question": "Comment appelle-t-on une personne dont la langue maternelle n'est ni le français ni l'anglais, les deux langues officielles du Canada ?",
            "options": [
                  "FRANCOVALUDE",
                  "ALLOPHONE",
                  "NÉO-QUÉBÉCOIS",
                  "MULTILINGUE DE SOUCHE"
            ],
            "answer": 1,
            "explanation": "Le terme allophone désigne les nouveaux arrivants dont la langue d'origine est différente de celle de la majorité. Leur intégration à la langue française est un enjeu important au Québec depuis la Loi 101."
      },
      {
            "number": 8,
            "question": "Quel mouvement de pensée s'oppose à la mondialisation actuelle et demande une économie plus humaine, plus sociale et plus respectueuse de l'environnement ?",
            "options": [
                  "NÉOLIBÉRALISME",
                  "ALTERMONDIALISME",
                  "SOCIALISME DÉMOCRATIQUE",
                  "ÉCO-GLOBALISME SOCIAL"
            ],
            "answer": 1,
            "explanation": "L'altermondialisme est un mouvement citoyen qui propose des alternatives au modèle économique dominant pour favoriser la justice sociale et la protection de la planète."
      },
      {
            "number": 9,
            "question": "Quelle position idéologique réclame la séparation de l'Église et de l'État et s'oppose à l'intervention du clergé dans les affaires publiques ?",
            "options": [
                  "ANTICLÉRICALISME",
                  "ULTRAMONTANISME",
                  "LAÏCISATION",
                  "PROVINCIALISME RELIGIEUX"
            ],
            "answer": 0,
            "explanation": "L'anticléricalisme était surtout présent au 19e siècle chez ceux qui critiquaient le pouvoir immense des évêques sur les décisions politiques et l'éducation au Québec."
      },
      {
            "number": 10,
            "question": "Comment appelle-t-on la politique qui force un groupe minoritaire à abandonner sa propre culture pour adopter celle du groupe dominant ?",
            "options": [
                  "MULTICULTURALISME",
                  "ASSIMILATION",
                  "ACCULTURATION VOLONTAIRE",
                  "INTÉGRATIONNISME ABSOLU"
            ],
            "answer": 1,
            "explanation": "L'assimilation est une politique qui vise à faire disparaître les différences culturelles d'un groupe pour qu'il se fonde complètement dans la culture de la majorité."
      },
      {
            "number": 11,
            "question": "Quel terme désigne l'ensemble des nations qui occupaient le territoire bien avant l'arrivée des explorateurs et des colons européens ?",
            "options": [
                  "PREMIÈRES NATIONS",
                  "AUTOCHTONES",
                  "MÉTIS",
                  "PEUPLES ABORIGÈNES DU NORD"
            ],
            "answer": 0,
            "explanation": "Le terme « Autochtones » est le terme générique qui inclut les Premières Nations, les Inuits et les Métis."
      },
      {
            "number": 12,
            "question": "Quel concept politique Maurice Duplessis défendait-il fermement pour empêcher le gouvernement fédéral de se mêler des domaines réservés au Québec ?",
            "options": [
                  "CENTRALISATION",
                  "SOUVERAINETÉ-ASSOCIATION",
                  "AUTONOMIE PROVINCIALE",
                  "PROVINCIALISME ADMINISTRATIF"
            ],
            "answer": 2,
            "explanation": "L'autonomie provinciale vise à protéger les compétences du Québec (comme la santé et l'éducation) face aux tentatives d'ingérence d'Ottawa."
      },
      {
            "number": 13,
            "question": "Comment appelle-t-on la période de forte natalité observée au Québec et au Canada entre 1945 et 1960 ?",
            "options": [
                  "DÉNATALITÉ",
                  "RÉVOLUTION TRANQUILLE",
                  "BABY-BOOM",

        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function isValidStoredState(parsed) {
      return !!(
        parsed &&
        Array.isArray(parsed.pool) &&
        Array.isArray(parsed.remainingQueue)
      );
    }

    function saveState() {
      try {
        const payload = JSON.stringify({
          pool,
          idx,
          score,
          answered,
          finished,
          remainingQueue,
          currentBatchSize,
          cumulativeCorrect,
          cumulativeAsked,
          seriesCount,
          selectedIndex,
          noteVisible,
          explanationViewed,
          playerName,
          savedAt: Date.now()
        });
        storageSet(STORAGE_KEY, payload);
      } catch (e) {}
    }

    function loadState() {
      try {
        const raw = storageGet(STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        return isValidStoredState(parsed) ? parsed : null;
      } catch (e) {
        return null;
      }
    }

    function clearState() {
      try {
        storageRemove(STORAGE_KEY);
      } catch (e) {}
    }
    function persistProgressSnapshot() {
      const overlayVisible = $('resumeOverlay') && $('resumeOverlay').classList.contains('show');
      const hasActiveQuizState = Array.isArray(pool) && pool.length > 0 && !overlayVisible;
      if (hasActiveQuizState) saveState();
    }


    function getPlayerName() {
      return String(playerName || '').trim().slice(0, 40);
    }

    function savePlayerNameFromInput() {
      playerName = String($('playerNameInput').value || '').trim().slice(0, 40);
      $('playerNameInput').value = playerName;
    }

    function formatPlayerNamePrefix() {
      const name = getPlayerName();
      return name ? name + ' · ' : '';
    }

    function formatPlayerNameGreeting() {
      const name = getPlayerName();
      return name ? name + ', ' : '';
    }

    function resetCycle() {
      remainingQueue = shuffle([...questions]);
      cumulativeCorrect = 0;
      cumulativeAsked = 0;
      seriesCount = 0;
    }

    function makeBatch(reset = false) {
      if (reset || remainingQueue.length === 0) resetCycle();
      currentBatchSize = Math.min(QUIZ_SIZE, remainingQueue.length);
      pool = remainingQueue.splice(0, currentBatchSize).map(prepQuestion);
      seriesCount++;
    }

    function startBatch(reset = false) {
      makeBatch(reset);
      idx = 0;
      score = 0;
      answered = false;
      finished = false;
      selectedIndex = null;
      noteVisible = false;
      explanationViewed = false;
      $('qCard').style.display = '';
      $('options').style.display = '';
      $('resultScreen').classList.remove('show');
      $('resultBar').style.width = '0%';
      hideNote();
      renderQ();
    }

    
    let explanationViewed = false;

    function hideNote() {
      noteVisible = false;
      $('noteOverlay').classList.remove('show');
      $('noteCard').classList.remove('correct', 'incorrect');
    }

    function showNote(isCorrect) {
      const q = pool[idx];
      $('noteText').textContent = q.explanation;
      $('noteLabel').textContent = isCorrect ? 'Bonne réponse' : 'Mauvaise réponse';
      $('noteNextBtn').textContent = idx === currentBatchSize - 1 ? 'Voir le résultat →' : 'Question suivante →';
      $('noteCard').classList.remove('correct', 'incorrect');
      $('noteCard').classList.add(isCorrect ? 'correct' : 'incorrect');
      $('noteOverlay').classList.add('show');
      noteVisible = true;
      explanationViewed = true;
      saveState();
    }

    function renderQ() {
      const q = pool[idx];
      const shouldShowNote = answered && noteVisible;
      hideNote();

      const totalQuestions = questions.length;
      const overallPosition = Math.min(cumulativeAsked + idx + 1, totalQuestions);
      const pct = Math.max(4, Math.round((overallPosition / totalQuestions) * 100));
      $('progressBar').style.width = pct + '%';
      $('progressLabel').textContent = overallPosition + ' / ' + totalQuestions;

      $('qNum').textContent = 'Dans cette série : ' + (idx + 1) + ' / ' + currentBatchSize;
      $('qType').textContent = '';
      $('qType').classList.add('hidden');

      $('qText').innerHTML = `<span class="question-source-num">Réf. ${q.number}</span> ${escapeHtml(q.question)}`;

      $('options').innerHTML = '';
      q.shuffledOptions.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerHTML = `<span class="opt-letter">${LETTERS[i]}</span><span>${escapeHtml(opt.text)}</span>`;
        btn.addEventListener('click', () => handleAnswer(i, btn));
        $('options').appendChild(btn);
      });

      if (answered) {
        const buttons = document.querySelectorAll('.opt-btn');
        buttons.forEach(b => b.disabled = true);
        buttons[q.correctIndex].classList.add('correct');

        if (selectedIndex !== q.correctIndex && buttons[selectedIndex]) {
          buttons[selectedIndex].classList.add('incorrect');
        }

        if (shouldShowNote) {
          noteVisible = true;
          showNote(selectedIndex === q.correctIndex);
          return;
        }
      }

      $('nextBtn').className = 'btn next-btn';
      $('nextBtn').textContent = idx === currentBatchSize - 1 ? 'Voir le résultat →' : 'Question suivante →';
      $('moreBtn').className = 'btn more-btn';
      saveState();
    }

    function handleAnswer(sel, selBtn) {
      if (answered || finished) return;
      answered = true;
      selectedIndex = sel;

      const q = pool[idx];
      const buttons = document.querySelectorAll('.opt-btn');
      buttons.forEach(b => b.disabled = true);
      buttons[q.correctIndex].classList.add('correct');

      const isCorrect = sel === q.correctIndex;
      if (!isCorrect) {
        selBtn.classList.add('incorrect');
      } else {
        score++;
      }

      showNote(isCorrect);
    }

    function renderResultScreen() {
      const pct = Math.round((score / currentBatchSize) * 100);
      const cumulativePct = Math.round((cumulativeCorrect / cumulativeAsked) * 100);

      $('qCard').style.display = 'none';
      $('options').style.display = 'none';
      const totalQuestions = questions.length;
      const overallCompleted = Math.min(cumulativeAsked, totalQuestions);
      const overallPct = Math.max(4, Math.round((overallCompleted / totalQuestions) * 100));
      $('progressBar').style.width = overallPct + '%';
      $('progressLabel').textContent = overallCompleted + ' / ' + totalQuestions;

      const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : '📚';
      const label = pct >= 80 ? 'Excellent résultat' : pct >= 60 ? 'Résultat solide' : 'Continue à pratiquer';
      const namePrefix = formatPlayerNamePrefix();
      const nameGreeting = formatPlayerNameGreeting();

      $('resultScore').textContent = emoji + '  ' + score + ' / ' + currentBatchSize;
      $('resultLabel').textContent = `${namePrefix}Série ${seriesCount} · ${label}`;

      const rem = remainingQueue.length;
      $('resultNote').textContent = rem > 0
        ? `${nameGreeting}cumulatif : ${cumulativeCorrect} / ${cumulativeAsked} (${cumulativePct} %). Il reste ${rem} question${rem > 1 ? 's' : ''} avant d'avoir tout vu.`
        : `${nameGreeting}cumulatif final : ${cumulativeCorrect} / ${cumulativeAsked} (${cumulativePct} %). Tu as maintenant vu toute la banque. La prochaine série repartira du début.`;

      $('resultScreen').classList.add('show');
      $('resultBar').style.width = pct + '%';
      $('nextBtn').className = 'btn next-btn visible';
      $('nextBtn').textContent = '🔄 Recommencer depuis le début';

      $('moreBtn').className = 'btn more-btn visible';
      $('moreBtn').textContent = rem > 0
        ? (rem >= QUIZ_SIZE ? 'Dix autres questions' : `Dernières ${rem} questions`)
        : 'Nouvelle ronde complète';
    }

    function showResult() {
      finished = true;
      noteVisible = false;
      hideNote();
      cumulativeCorrect += score;
      cumulativeAsked += currentBatchSize;
      renderResultScreen();
      saveState();
    }

    $('noteNextBtn').addEventListener('click', () => {
      if (!answered || !explanationViewed) return;
      hideNote();
      if (idx < currentBatchSize - 1) {
        idx++;
        answered = false;
        selectedIndex = null;
        noteVisible = false;
        explanationViewed = false;
        renderQ();
      } else {
        showResult();
      }
    });

    $('nextBtn').addEventListener('click', () => {
      if (finished) { startBatch(true); return; }
    });

    $('moreBtn').addEventListener('click', () => {
      if (!finished) return;
      startBatch(false);
    });

    function applyRestoredState(restoredState) {
      pool = restoredState.pool;
      idx = restoredState.idx;
      score = restoredState.score;
      answered = restoredState.answered;
      finished = restoredState.finished;
      remainingQueue = restoredState.remainingQueue;
      currentBatchSize = restoredState.currentBatchSize;
      cumulativeCorrect = restoredState.cumulativeCorrect;
      cumulativeAsked = restoredState.cumulativeAsked;
      seriesCount = restoredState.seriesCount;
      selectedIndex = Number.isInteger(restoredState.selectedIndex) ? restoredState.selectedIndex : null;
      noteVisible = !!restoredState.noteVisible;
      explanationViewed = !!restoredState.explanationViewed;
      playerName = String(restoredState.playerName || '').trim().slice(0, 40);

      $('resumeOverlay').classList.remove('show');

      if (finished) {
        hideNote();
        renderResultScreen();
      } else {
        $('qCard').style.display = '';
        $('options').style.display = '';
        $('resultScreen').classList.remove('show');
        $('resultBar').style.width = '0%';
        renderQ();
      }
    }

    function showIdentityStep() {
      const titleEl = $('resumeTitle');
      const textEl = $('resumeText');
      const continueBtn = $('resumeContinueBtn');
      const restartBtn = $('resumeRestartBtn');
      const fieldEl = $('resumeField');
      const nameInput = $('playerNameInput');

      fieldEl.style.display = '';
      nameInput.value = getPlayerName();
      titleEl.textContent = 'Identification';
      textEl.innerHTML = 'Tu peux inscrire un nom ou un surnom pour personnaliser les messages du quiz.<br><br>Pour conserver ta progression, il vaut mieux utiliser le même appareil et le même navigateur.';
      continueBtn.textContent = 'Commencer';
      restartBtn.style.display = 'none';

      continueBtn.onclick = () => {
        savePlayerNameFromInput();
        $('resumeOverlay').classList.remove('show');
        startBatch(true);
      };
      restartBtn.onclick = null;
      setTimeout(() => nameInput.focus(), 0);
    }

    function bootQuiz() {
      const restoredState = loadState();
      const titleEl = $('resumeTitle');
      const textEl = $('resumeText');
      const continueBtn = $('resumeContinueBtn');
      const restartBtn = $('resumeRestartBtn');
      const fieldEl = $('resumeField');
      const nameInput = $('playerNameInput');

      $('resumeOverlay').classList.add('show');

      if (restoredState) {
        const restoredName = String(restoredState.playerName || '').trim().slice(0, 40);
        playerName = restoredName;
        nameInput.value = restoredName;
        fieldEl.style.display = 'none';

        titleEl.textContent = restoredName ? `Bon retour, ${restoredName}` : 'Une progression a été trouvée';
        textEl.innerHTML = 'Tu peux reprendre là où tu t’étais arrêté ou recommencer depuis le début.<br><br>Pour conserver ta progression, il vaut mieux utiliser le même appareil et le même navigateur.';
        continueBtn.textContent = 'Reprendre';
        restartBtn.textContent = 'Recommencer depuis le début';
        restartBtn.style.display = '';

        continueBtn.onclick = () => applyRestoredState(restoredState);
        restartBtn.onclick = () => {
          clearState();
          playerName = '';
          nameInput.value = '';
          bootQuiz();
        };
      } else {
        fieldEl.style.display = 'none';
        titleEl.innerHTML = 'Quiz interactif<br>Vocabulaire — Histoire du Québec et du Canada<br>4e secondaire';
        textEl.innerHTML = 'Ce quiz permet de vérifier ta compréhension du vocabulaire important du cours et de mieux reconnaître les notions dans leur contexte historique.';
        continueBtn.textContent = 'Poursuivre';
        restartBtn.style.display = 'none';

        continueBtn.onclick = () => {
          showIdentityStep();
        };
        restartBtn.onclick = null;
      }
    }

    window.addEventListener('pagehide', persistProgressSnapshot);
    window.addEventListener('beforeunload', persistProgressSnapshot);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') persistProgressSnapshot();
    });

    bootQuiz();
  </script>
</body>
</html>
